<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driftibo — Curators of the good life</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=Plus+Jakarta+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0ea;
      --text: #1e1a17;
      --accent: #b5603a;
      --muted: #7a6e67;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
    }

    main {
      text-align: center;
      max-width: 560px;
    }

    .wordmark {
      font-family: 'Fraunces', serif;
      font-size: clamp(3.5rem, 12vw, 6.5rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
    }

    .accent-dot {
      color: var(--accent);
    }

    .tagline {
      margin-top: 1.5rem;
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1rem, 3vw, 1.25rem);
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    .divider {
      width: 2rem;
      height: 1px;
      background: var(--accent);
      margin: 2.5rem auto;
      opacity: 0.5;
    }

    .inquiry {
      font-size: 0.875rem;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    .inquiry a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .inquiry a:hover {
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <h1 class="wordmark">Driftibo<span class="accent-dot">.</span></h1>
    <p class="tagline">Curators of the good life. Coming soon.</p>
    <div class="divider" aria-hidden="true"></div>
    <p class="inquiry">For early inquiries — <a href="mailto:travel@driftibo.com">travel@driftibo.com</a></p>
  </main>
</body>
</html>
